<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Wheel Balance</title>
<link rel="manifest" href="manifest.json">
<link rel="icon" href="icon-192.png" type="image/png">
<link rel="apple-touch-icon" href="apple-touch-icon.png">
<meta name="theme-color" content="#14171A">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Wheel Balance">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --bg: #14171A;
    --panel: #1E2226;
    --panel-2: #23272C;
    --border: #2C3136;
    --text: #E8E6E1;
    --text-dim: #9AA0A6;
    --text-faint: #656B71;
    --accent: #C98A3E;
    --accent-dim: #8C6231;
    --accent-text: #17130C;
    --data: #6FA8B5;
    --good: #7FB069;
    --bad: #C1554A;
    --radius: 10px;
  }
  *{ box-sizing: border-box; }
  html,body{ margin:0; padding:0; }
  body{
    background: var(--bg);
    color: var(--text);
    font-family: 'IBM Plex Mono', monospace;
    -webkit-font-smoothing: antialiased;
    min-height: 100vh;
    padding-bottom: 48px;
  }
  h1,h2,h3, .display{
    font-family: 'Space Grotesk', sans-serif;
    font-weight: 600;
    letter-spacing: -0.01em;
  }
  .wrap{
    max-width: 640px;
    margin: 0 auto;
    padding: 20px 16px 40px;
  }
  header.app-header{
    display:flex;
    align-items:center;
    gap: 14px;
    padding: 8px 0 22px;
  }
  .ring-mark{ flex-shrink:0; }
  .app-title{ font-size: 22px; margin:0; color: var(--text); }
  .app-sub{ font-size: 12px; color: var(--text-dim); margin: 2px 0 0; letter-spacing: 0.02em; }

  .btn{
    font-family: 'IBM Plex Mono', monospace;
    font-size: 13px;
    font-weight: 500;
    border-radius: 8px;
    border: 1px solid var(--border);
    background: var(--panel-2);
    color: var(--text);
    padding: 11px 16px;
    cursor: pointer;
    -webkit-tap-highlight-color: transparent;
  }
  .btn:active{ transform: translateY(1px); }
  .btn-primary{
    background: var(--accent);
    border-color: var(--accent);
    color: var(--accent-text);
    font-weight: 600;
  }
  .btn-ghost{
    background: transparent;
  }
  .btn-danger{
    color: var(--bad);
    border-color: #3A2321;
  }
  .btn-block{ width:100%; }
  .btn-row{ display:flex; gap:10px; flex-wrap: wrap; }
  .btn:disabled{ opacity:0.4; cursor:not-allowed; }

  .card{
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 16px;
    margin-bottom: 14px;
  }
  .empty{
    text-align:center;
    color: var(--text-dim);
    padding: 48px 16px;
    font-size: 13px;
    line-height: 1.6;
  }
  .empty .display{ color: var(--text); font-size: 17px; display:block; margin-bottom: 6px; }

  .analysis-card{ display:flex; justify-content:space-between; align-items:flex-start; gap: 10px; }
  .analysis-name{ font-family:'Space Grotesk',sans-serif; font-size:16px; font-weight:600; margin:0 0 4px; }
  .analysis-meta{ font-size: 12px; color: var(--text-dim); line-height: 1.6; }
  .badge{
    display:inline-block;
    font-size: 10px;
    font-weight: 600;
    letter-spacing: 0.04em;
    text-transform: uppercase;
    padding: 3px 8px;
    border-radius: 20px;
    border: 1px solid var(--border);
    color: var(--text-dim);
  }
  .badge-chosen{ color: var(--good); border-color: #2C3D26; background: #1C2318; }
  .badge-unchosen{ color: var(--text-faint); }

  label{ display:block; font-size: 11px; color: var(--text-dim); margin-bottom: 6px; letter-spacing: 0.03em; text-transform: uppercase; }
  input[type=text], input[type=number]{
    width: 100%;
    background: var(--panel-2);
    border: 1px solid var(--border);
    border-radius: 8px;
    color: var(--text);
    font-family: 'IBM Plex Mono', monospace;
    font-size: 14px;
    padding: 11px 12px;
  }
  input:focus{ outline: 2px solid var(--accent-dim); outline-offset: 1px; }
  input.invalid{ border-color: var(--bad); }
  .field{ margin-bottom: 16px; }

  .size-picker{ display:flex; gap:8px; margin-bottom: 4px; }
  .size-btn{
    flex:1;
    text-align:center;
    padding: 14px 6px;
    border-radius: 8px;
    border: 1px solid var(--border);
    background: var(--panel-2);
    cursor:pointer;
  }
  .size-btn .n{ font-family:'Space Grotesk',sans-serif; font-size: 20px; font-weight:700; display:block; color: var(--text); }
  .size-btn .lbl{ font-size: 10px; color: var(--text-dim); text-transform:uppercase; letter-spacing:0.05em; }
  .size-btn.active{ border-color: var(--accent); background: #241C10; }
  .size-btn.active .n{ color: var(--accent); }

  table{ width:100%; border-collapse: collapse; font-size: 13px; }
  th{
    text-align:left;
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 0.05em;
    color: var(--text-faint);
    font-weight:500;
    padding: 6px 6px;
    border-bottom: 1px solid var(--border);
  }
  td{ padding: 7px 6px; border-bottom: 1px solid #22262A; vertical-align:middle; }
  tr:last-child td{ border-bottom:none; }
  .idx-col{ color: var(--text-faint); width: 28px; }
  td input[type=text]{ padding: 7px 8px; font-size:13px; }
  td input[type=number]{ padding: 7px 8px; font-size:13px; }
  .weight-col{ width: 100px; }

  .tabs{ display:flex; gap:6px; margin-bottom: 12px; }
  .tab{
    flex:1;
    text-align:center;
    padding: 10px 4px;
    border-radius: 8px;
    border: 1px solid var(--border);
    background: var(--panel-2);
    cursor:pointer;
    font-size: 12px;
    color: var(--text-dim);
  }
  .tab.active{ border-color: var(--data); color: var(--text); background:#182226; }
  .tab .score{ display:block; font-family:'Space Grotesk',sans-serif; font-size:15px; font-weight:700; color: var(--data); margin-top:2px; }
  .tab.active .score{ color: var(--data); }
  .tab .chosen-dot{ color: var(--good); }

  .score-note{ font-size:11px; color: var(--text-faint); margin: -6px 0 14px; }

  .section-title{ font-size: 13px; color: var(--text-dim); margin: 22px 0 10px; text-transform:uppercase; letter-spacing:0.04em; }
  .section-title:first-child{ margin-top:0; }

  .toast{
    position: fixed; bottom: 18px; left:50%; transform: translateX(-50%);
    background: var(--panel-2); border:1px solid var(--border); color: var(--text);
    padding: 10px 16px; border-radius: 8px; font-size: 12px; z-index: 50;
    box-shadow: 0 8px 24px rgba(0,0,0,0.4);
  }
  .err-text{ color: var(--bad); font-size: 12px; margin-top: 6px; }
  .footer{
    text-align:center; color: var(--text-faint); font-size: 10px; margin-top: 36px; letter-spacing:0.03em;
  }
  a.linklike{ color: var(--data); cursor:pointer; text-decoration: underline; }
  input[type=file]{ display:none; }

  .mode-toggle{ margin: 14px 0 16px; }
  .step-nav-strip{
    display:flex; gap:6px; overflow-x:auto; padding: 2px 2px 10px;
    -webkit-overflow-scrolling: touch;
  }
  .step-pill{
    flex-shrink:0; width:32px; height:32px; border-radius:50%;
    display:flex; align-items:center; justify-content:center;
    font-size:12px; border:1px solid var(--border); background: var(--panel-2);
    color: var(--text-dim); cursor:pointer;
  }
  .step-pill.filled{ border-color: var(--data); color: var(--data); }
  .step-pill.invalid{ border-color: var(--bad); color: var(--bad); }
  .step-pill.current{ border-color: var(--accent); background:#241C10; color: var(--accent); font-weight:600; }
  .step-card{ text-align:left; }
  .step-counter{
    font-family:'Space Grotesk',sans-serif; font-size:13px; color: var(--text-dim);
    margin-bottom:16px; text-transform:uppercase; letter-spacing:0.04em;
  }
  .step-weight-input{
    font-size:28px !important; padding:16px !important; text-align:center;
    font-family:'Space Grotesk',sans-serif; font-weight:600;
  }

  .icon-btn{
    background: transparent; border: 1px solid var(--border); border-radius: 8px;
    width: 38px; height: 38px; display:flex; align-items:center; justify-content:center;
    cursor:pointer; color: var(--text-dim); flex-shrink:0; padding:0;
  }
  .icon-btn:active{ transform: translateY(1px); }
  .header-row{ display:flex; align-items:center; justify-content:space-between; gap:10px; }
  .header-row .app-header{ padding: 8px 0; flex:1; }
  .back-row{ display:flex; align-items:center; gap:10px; margin-bottom: 18px; }
  .back-row .icon-btn{ }
  .menu-row{
    display:flex; align-items:center; justify-content:space-between;
    padding: 15px 16px; cursor:pointer;
  }
  .menu-row + .menu-row{ border-top: 1px solid var(--border); }
  .menu-row .menu-label{ font-family:'Space Grotesk',sans-serif; font-size:14px; font-weight:600; }
  .menu-row .menu-sub{ font-size:11px; color: var(--text-faint); margin-top:2px; }
  .menu-row .chev{ color: var(--text-faint); font-size:14px; }
  .help-block{ margin-bottom: 22px; }
  .help-block h3{ font-size:15px; margin: 0 0 6px; color: var(--accent); }
  .help-block p{ font-size:13px; color: var(--text-dim); line-height:1.65; margin: 0 0 8px; }
  .about-row{ display:flex; justify-content:space-between; padding: 10px 0; border-bottom: 1px solid var(--border); font-size:13px; }
  .about-row:last-child{ border-bottom:none; }
  .about-row .k{ color: var(--text-faint); }
  .about-row .v{ color: var(--text); font-family:'Space Grotesk',sans-serif; }

  .view-toggle{ display:flex; gap:8px; margin-bottom:14px; }
  .view-toggle .btn{ flex:1; }
  .chart-wrap{ padding: 12px 4px 6px; }
  .chart-detail{
    margin-top: 10px; padding: 12px 14px; border-radius: 8px;
    background: var(--panel-2); border: 1px solid var(--border);
    font-size: 13px; min-height: 20px;
  }
  .chart-detail .cd-empty{ color: var(--text-faint); font-size:12px; }
  .chart-detail .cd-row{ display:flex; justify-content:space-between; padding: 3px 0; }
  .chart-detail .cd-row .k{ color: var(--text-faint); }
  .chart-detail .cd-row .v{ color: var(--text); font-family:'Space Grotesk',sans-serif; }

  .share-menu-wrap{ position:relative; }
  .share-menu{
    position:absolute; top:44px; right:0; z-index:20;
    background: var(--panel-2); border:1px solid var(--border); border-radius:10px;
    width: 240px; box-shadow: 0 12px 30px rgba(0,0,0,0.5); overflow:hidden;
  }
  .share-menu-row{ padding:13px 14px; cursor:pointer; }
  .share-menu-row + .share-menu-row{ border-top:1px solid var(--border); }
  .share-menu-row .sm-label{ font-family:'Space Grotesk',sans-serif; font-size:13px; font-weight:600; }
  .share-menu-row .sm-sub{ font-size:11px; color: var(--text-faint); margin-top:2px; }
  .share-menu-row.disabled{ opacity:0.5; cursor:default; }

  /* ---- Printable document page: intentionally a light theme, independent of the app's dark UI ---- */
  .print-toolbar{ display:flex; gap:10px; margin-bottom:18px; }
  .print-page{
    --p-bg:#ffffff; --p-text:#1a1a1a; --p-dim:#5b5b5b; --p-faint:#8a8a8a;
    --p-border:#dcdcdc; --p-accent:#8a5a20; --p-data:#2b6777;
    background: var(--p-bg); color: var(--p-text);
    border-radius: 10px; padding: 28px 26px; font-family:'IBM Plex Mono', monospace;
  }
  .print-page h1, .print-page h2{ font-family:'Space Grotesk',sans-serif; margin:0; }
  .print-page .pp-eyebrow{ font-size:11px; letter-spacing:0.06em; text-transform:uppercase; color: var(--p-faint); margin-bottom:4px; }
  .print-page .pp-title{ font-size:22px; font-weight:700; color: var(--p-text); }
  .print-page .pp-sub{ font-size:13px; color: var(--p-dim); margin-top:3px; }
  .print-page .pp-meta{ font-size:11px; color: var(--p-faint); margin-top:10px; line-height:1.7; border-top:1px solid var(--p-border); padding-top:10px; }
  .print-page table{ width:100%; border-collapse:collapse; font-size:12px; margin-top:18px; }
  .print-page th{ text-align:left; font-size:10px; text-transform:uppercase; letter-spacing:0.04em; color:var(--p-dim); border-bottom:1.5px solid var(--p-text); padding:6px 6px; }
  .print-page td{ padding:6px 6px; border-bottom:1px solid var(--p-border); color: var(--p-text); }
  .print-page .pp-chart-title{ font-size:13px; font-weight:600; margin: 22px 0 4px; color: var(--p-text); }
  .print-page .pp-footer{ margin-top:22px; font-size:10px; color: var(--p-faint); text-align:center; }
  .print-page .pp-chart-section{
    break-before: page; page-break-before: always;
    break-inside: avoid; page-break-inside: avoid;
  }
  .print-page .pp-chart-section .pp-chart-title{ margin-top:0; }
  .print-page .pp-chart-grid{ display:grid; grid-template-columns: 1fr 1fr; gap: 18px 14px; margin-top:10px; }
  .print-page .pp-chart-cell{
    border:1px solid var(--p-border); border-radius:8px; padding:10px 8px 6px;
    break-inside: avoid; page-break-inside: avoid;
  }
  .print-page .pp-chart-cell .pp-chart-cap{ text-align:center; font-size:11px; font-weight:600; margin-bottom:4px; }
  .print-page .pp-chart-cell .pp-chart-score{ text-align:center; font-size:10px; color:var(--p-dim); margin-bottom:6px; }
  .print-page table.compare-table th, .print-page table.compare-table td{ font-size:10.5px; }
  .print-page table.compare-table .method-score{ display:block; font-size:9px; color:var(--p-faint); font-weight:400; text-transform:none; letter-spacing:0; }

  @media print{
    .no-print{ display:none !important; }
    body{ background:#fff; padding-bottom:0; }
    .wrap{ max-width:none; padding:0; }
    .print-page{ border-radius:0; padding:0; }
  }
  @page{ size: portrait; margin: 0.6in; }

  .splash-wrap{
    display:flex; flex-direction:column; align-items:center; justify-content:center;
    min-height: 88vh; text-align:center; padding: 24px 12px;
  }
  .splash-image{
    width:100%; max-width:320px; border-radius:14px; overflow:hidden;
    box-shadow: 0 20px 50px rgba(0,0,0,0.55); margin-bottom:30px; border:1px solid var(--border);
  }
  .splash-image img{ display:block; width:100%; height:auto; }
  .splash-lines{ margin-bottom:34px; }
  .splash-line1{
    font-family:'Space Grotesk',sans-serif; font-weight:700; font-size:27px;
    color: var(--text); letter-spacing:-0.01em; margin-bottom:14px;
  }
  .splash-line23{
    font-family:'Space Grotesk',sans-serif; font-weight:600; font-size:17px;
    color: var(--text-dim); margin-bottom:4px;
  }
  .splash-line23.group-end{ margin-bottom:18px; }
  .splash-line45{
    font-family:'IBM Plex Mono',monospace; font-size:12.5px; letter-spacing:0.02em;
    color: var(--text-faint); margin-bottom:2px;
  }
</style>
</head>
<body>
<div class="wrap" id="app"></div>

function uid(){ return 'x' + Math.random().toString(36).slice(2,10) + Date.now().toString(36); }
function randInt(n){ return Math.floor(Math.random()*n); }
function fmtDate(iso){
  const d = new Date(iso);

function escapeHtml(s){
  return String(s == null ? '' : s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}

/* ===================== Balancing algorithms ===================== */
function unitVectorsFor(N){
  const v = [];
  for(let i=0;i<N;i++){
    const ang = i * 2 * Math.PI / N;
    v.push([Math.cos(ang), Math.sin(ang)]);
  }
  return v;
}
function imbalanceScore(arrangement, weights, unitVectors){
  let sx=0, sy=0;
  for(let i=0;i<arrangement.length;i++){
    const w = weights[arrangement[i]];
    sx += w * unitVectors[i][0];
    sy += w * unitVectors[i][1];
  }
  return Math.sqrt(sx*sx + sy*sy);
}
// Fixed AITexcel placement order — a predetermined position-by-rank table
// supplied for each wafer size (rank 1 = lightest paddle, rank N = heaviest).
// These are not computed; they're specified exactly and must not change.
const AITEXCEL_RANK_ORDER = {
  13: [1,13,3,11,5,9,7,8,2,10,4,12,6],
  17: [1,17,3,15,5,13,7,11,9,2,10,12,4,14,6,16,8],
  25: [1,25,3,23,5,21,7,19,9,17,11,15,13,14,2,16,4,18,6,20,8,22,10,24,12]
};
function pairingArrangement(discs){
  const N = discs.length;
  const table = AITEXCEL_RANK_ORDER[N];
  // sortedAsc[rank-1] = the disc index holding that rank (1 = lightest)
  const sortedAsc = discs.map((d,i)=>i).sort((a,b)=> discs[a].weight - discs[b].weight);
  const positions = new Array(N);
  for(let pos=0; pos<N; pos++){
    positions[pos] = sortedAsc[table[pos]-1];
  }
  return positions;
}
// Heuristic 2: simulated annealing local search over pairwise swaps.
function simulatedAnnealing(discs, unitVectors, initial){
  const N = discs.length;
  const weights = discs.map(d=>d.weight);
  let current = initial.slice();
  let currentScore = imbalanceScore(current, weights, unitVectors);
  let best = current.slice(), bestScore = currentScore;
  let T = Math.max(currentScore, 1) ;
  const coolingRate = 0.997;
  const iterations = Math.max(8000, N * 900);
  for(let iter=0; iter<iterations; iter++){
    const i = randInt(N), j = randInt(N);
    if(i===j) continue;
    [current[i], current[j]] = [current[j], current[i]];
    const newScore = imbalanceScore(current, weights, unitVectors);
    const delta = newScore - currentScore;
    if(delta < 0 || Math.random() < Math.exp(-delta / T)){
      currentScore = newScore;
      if(currentScore < bestScore){ bestScore = currentScore; best = current.slice(); }
    } else {
      [current[i], current[j]] = [current[j], current[i]];
    }
    T = Math.max(T * coolingRate, 1e-6);
  }
  return { arrangement: best, score: bestScore };
}
// Heuristic 3: genetic algorithm with order crossover + swap mutation.
function geneticAlgorithm(discs, unitVectors){
  const N = discs.length;
  const weights = discs.map(d=>d.weight);
  const popSize = Math.min(80, Math.max(40, N*3));
  const generations = Math.min(400, Math.max(150, N*15));

  function randomPerm(){
    const a = [...Array(N).keys()];
    for(let i=N-1;i>0;i--){ const j = randInt(i+1); [a[i],a[j]]=[a[j],a[i]]; }
    return a;
  }
  function fitness(p){ return imbalanceScore(p, weights, unitVectors); }
  function tournament(pop, scores){
    const a = randInt(pop.length), b = randInt(pop.length);
    return scores[a] < scores[b] ? pop[a] : pop[b];
  }
  function orderCrossover(p1, p2){
    const a = randInt(N), b = randInt(N);
    const start = Math.min(a,b), end = Math.max(a,b);
    const child = new Array(N).fill(null);
    const used = new Set();
    for(let i=start;i<=end;i++){ child[i]=p1[i]; used.add(p1[i]); }
    let idx = (end+1) % N;
    for(let i=0;i<N;i++){
      const gene = p2[(end+1+i) % N];
      if(!used.has(gene)){
        child[idx] = gene; used.add(gene);
        idx = (idx+1) % N;
      }
    }
    return child;
  }
  function mutate(p){
    if(Math.random() < 0.25){
      const i = randInt(N), j = randInt(N);
      [p[i],p[j]] = [p[j],p[i]];
    }
    return p;
  }

  let population = Array.from({length: popSize}, randomPerm);
  let best = null, bestScore = Infinity;
  for(let g=0; g<generations; g++){
    const scores = population.map(fitness);
    for(let i=0;i<population.length;i++){
      if(scores[i] < bestScore){ bestScore = scores[i]; best = population[i].slice(); }
    }
    const sortedIdx = [...scores.keys()].sort((a,b)=>scores[a]-scores[b]);
    const newPop = [population[sortedIdx[0]].slice(), population[sortedIdx[1]].slice()];
    while(newPop.length < popSize){
      const p1 = tournament(population, scores);
      const p2 = tournament(population, scores);
      newPop.push(mutate(orderCrossover(p1,p2)));
    }
    population = newPop;
  }
  return { arrangement: best, score: bestScore };
}
// "As Entered" isn't stored — it's just the identity arrangement (position i = disc i),
// so it's always recomputed from the current disc list. This also means it's available
// for analyses saved before this method existed.
function getMethodResult(a, method){
  if(a.results && a.results[method]) return a.results[method];
  // Safety fallback only: analyses saved before "As Entered" was stored as part of
  // the results object won't have this field. Computed live here so nothing breaks,
  // but it isn't saved — use Recalculate to store it permanently like the other three.
  if(method === 'asEntered'){
    const N = a.discCount;
    const arrangement = [...Array(N).keys()];
    const uv = unitVectorsFor(N);
    const weights = a.discs.map(d=>d.weight);
    return { arrangement, score: imbalanceScore(arrangement, weights, uv) };
  }
  return a.results ? a.results[method] : undefined;
}
function runAllHeuristics(discs){
  const N = discs.length;
  const unitVectors = unitVectorsFor(N);
  const weights = discs.map(d=>d.weight);
  const asEnteredArr = [...Array(N).keys()];
  const asEnteredScore = imbalanceScore(asEnteredArr, weights, unitVectors);
  const pairingArr = pairingArrangement(discs);
  const pairingScore = imbalanceScore(pairingArr, weights, unitVectors);
  const sa = simulatedAnnealing(discs, unitVectors, pairingArr);
  const ga = geneticAlgorithm(discs, unitVectors);
  return {
    asEntered: { arrangement: asEnteredArr, score: asEnteredScore },
    pairing:   { arrangement: pairingArr,     score: pairingScore },
    annealing: { arrangement: sa.arrangement, score: sa.score },
    genetic:   { arrangement: ga.arrangement, score: ga.score }
  };
}

/* ===================== Storage (persistent, on this device/browser) =====================
   Uses the browser's localStorage, which is what actually persists data on a real
   hosted site. All keys are prefixed "analysis:" so this app doesn't collide with
   anything else that might be stored in the same browser. */
const Store = {
  async list(){
    try{
      return Object.keys(localStorage).filter(k => k.startsWith('analysis:'));
    } catch(e){ return []; }
  },
  async get(key){
    try{
      const raw = localStorage.getItem(key);
      return raw ? JSON.parse(raw) : null;
    } catch(e){ return null; }
  },
  async set(analysis){
    const key = 'analysis:' + analysis.id;
    localStorage.setItem(key, JSON.stringify(analysis));
  },
  async delete(id){
    try{ localStorage.removeItem('analysis:' + id); } catch(e){}
  },
  async all(){
    const keys = await this.list();
    const items = [];
    for(const k of keys){
      const a = await this.get(k);
      if(a) items.push(a);
    }
    items.sort((a,b)=> new Date(b.createdAt) - new Date(a.createdAt));
    return items;
  }
};

/* ===================== CSV export / import ===================== */
function analysesToCsvRows(analyses){
  const rows = [];
  for(const a of analyses){
    // input rows: original entry order
    a.discs.forEach((d, i)=>{
      rows.push({
        analysisId: a.id, name: a.name, createdAt: a.createdAt, size: a.size,
        discCount: a.discCount, chosen: a.chosen || '', recordType: 'input',
        position: i, discId: d.id, discLabel: d.label, discWeight: d.weight, score: ''
      });
    });
    // method rows: ring position order
    ['asEntered','pairing','annealing','genetic'].forEach(method=>{
      const res = getMethodResult(a, method);
      if(!res) return;
      res.arrangement.forEach((discIdx, pos)=>{
        const d = a.discs[discIdx];
        rows.push({
          analysisId: a.id, name: a.name, createdAt: a.createdAt, size: a.size,
          discCount: a.discCount, chosen: a.chosen || '', recordType: method,
          position: pos, discId: d.id, discLabel: d.label, discWeight: d.weight,
          score: res.score
        });
      });
    });
  }
  return rows;
}
function filenameTimestamp(){
  const d = new Date();
  const pad = n => String(n).padStart(2, '0');
  return `${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}_${pad(d.getHours())}${pad(d.getMinutes())}`;
}
function exportCsv(analyses){
  const rows = analysesToCsvRows(analyses);
  const csv = Papa.unparse(rows, { columns: ['analysisId','name','createdAt','size','discCount','chosen','recordType','position','discId','discLabel','discWeight','score'] });
  const blob = new Blob([csv], { type: 'text/csv' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = `wheel-balance-analyses-${filenameTimestamp()}.csv`;
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);
}
function csvRowsToAnalyses(rows){
  const groups = {};
  rows.forEach(r=>{
    if(!r.analysisId) return;
    (groups[r.analysisId] = groups[r.analysisId] || []).push(r);
  });
  const analyses = [];
  Object.values(groups).forEach(groupRows=>{
    const first = groupRows[0];
    const newAnalysisId = uid();
    // rebuild discs from input rows, mapping old discId -> new discId
    const inputRows = groupRows.filter(r=>r.recordType === 'input').sort((a,b)=>Number(a.position)-Number(b.position));
    if(inputRows.length === 0) return;
    const idMap = {};
    const discs = inputRows.map(r=>{
      const newId = uid();
      idMap[r.discId] = newId;
      return { id: newId, label: r.discLabel || '', weight: Number(r.discWeight) };
    });
    const results = {};
    ['pairing','annealing','genetic'].forEach(method=>{
      const methodRows = groupRows.filter(r=>r.recordType === method).sort((a,b)=>Number(a.position)-Number(b.position));
      if(methodRows.length === discs.length){
        const arrangement = methodRows.map(r=>{
          const newId = idMap[r.discId];
          return discs.findIndex(d=>d.id === newId);
        });
        const score = Number(methodRows[0].score);
        results[method] = { arrangement, score };
      }
    });
    analyses.push({
      id: newAnalysisId,
      name: (first.name || 'Imported analysis'),
      size: first.size,
      discCount: discs.length,
      createdAt: first.createdAt || new Date().toISOString(),
      discs, results,
      chosen: ['asEntered','pairing','annealing','genetic'].includes(first.chosen) ? first.chosen : null
    });
  });
  return analyses;
}
function importCsvFile(file){
  return new Promise((resolve,reject)=>{
    Papa.parse(file, {
      header: true, skipEmptyLines: true,
      complete: (res)=> resolve(csvRowsToAnalyses(res.data)),
      error: reject
    });
  });
}

function ringMarkSvg(n, size){
  n = n || 8;
  const r = size/2 - 4;
  const cx = size/2, cy = size/2;
  let dots = '';
  for(let i=0;i<n;i++){
    const ang = i*2*Math.PI/n - Math.PI/2;
    const x = cx + r*Math.cos(ang), y = cy + r*Math.sin(ang);
    dots += `<circle cx="${x.toFixed(2)}" cy="${y.toFixed(2)}" r="2.4" fill="var(--accent)"/>`;
  }
  return `<svg class="ring-mark" width="${size}" height="${size}" viewBox="0 0 ${size} ${size}">
    <circle cx="${cx}" cy="${cy}" r="${r}" fill="none" stroke="var(--border)" stroke-width="1.5"/>
    ${dots}
  </svg>`;
}

async function init(){
  state.savedList = await Store.all();
  state.loading = false;
  render();
}

function showToast(msg){
  const t = document.createElement('div');

}

}

/* ---------- Help ---------- */
function renderHelp(){
  app.innerHTML = `
    <div class="back-row">
      <button class="icon-btn" id="btn-back-help" aria-label="Back">${backArrowSvg()}</button>
      <h1 class="app-title" style="font-size:19px;">Help</h1>
    </div>

    <div class="help-block">
      <h3>What's an imbalance score?</h3>
      <p>Each paddle sits at a fixed slot around the wafer. The imbalance score measures how far the combined weight is from being perfectly centered — it adds up every paddle's weight, factoring in its position around the ring. A score of 0 would mean perfect balance. Lower is always better, and it's only meaningful when comparing arrangements of the <em>same</em> set of paddles.</p>
    </div>

    <div class="help-block">
      <h3>As Entered</h3>
      <p>This isn't an optimization at all — it's simply the imbalance score if the paddles were placed in the exact order you typed them in. It's here as a baseline, so you can see how much the other methods actually improve on a naive, unplanned arrangement.</p>
    </div>

    <div class="help-block">
      <h3>AITexcel</h3>
      <p>This method doesn't search for a balanced arrangement — it places paddles in a fixed, predetermined order by rank (lightest to heaviest), specific to each wafer size. It's not adaptive to the particular set of weights you enter, so its score can vary more than the other methods depending on how your paddle weights happen to fall. It's included for comparison alongside the two search-based methods.</p>
    </div>

    <div class="help-block">
      <h3>Simulated Annealing</h3>
      <p>This method starts from an arrangement and repeatedly tries swapping two paddles, keeping the swap if it improves balance. Early on, it will also occasionally accept a swap that makes things slightly worse — this helps it avoid getting stuck on a decent-but-not-great arrangement. Over many tries, it settles on a strong result. In testing, this method typically produces the best or near-best score of the three.</p>
    </div>

    <div class="help-block">
      <h3>Genetic Algorithm</h3>
      <p>This method keeps a large group of candidate arrangements at once, combines pairs of the better ones to create new candidates, and occasionally introduces small random changes. Over many generations, the population tends to improve. It's a different search strategy than Simulated Annealing, and comparing the two can be a useful check — when they agree closely, you can be more confident you're close to the best possible arrangement.</p>
    </div>

    <div class="help-block">
      <h3>Which one should I use?</h3>
      <p>Simulated Annealing and the Genetic Algorithm usually land very close to each other and well ahead of AITexcel. If they're nearly tied, either is a safe choice. If one is noticeably better, go with that one — the "Mark as chosen" button on each method's tab records your decision.</p>
    </div>
  `;
  document.getElementById('btn-back-help').onclick = () => { state.view='settings'; render(); };
}

function renderStepView(d){
  const N = d.discs.length;
  const disc = d.discs[d.stepIndex];
  const isLast = d.stepIndex === N - 1;
  return `
    <div class="step-nav-strip">
      ${d.discs.map((disc2, i)=>{
        let cls = 'step-pill';
        if(i === d.stepIndex) cls += ' current';
        else if(disc2._invalid) cls += ' invalid';
        else if(disc2.weight !== null && !isNaN(disc2.weight) && disc2.weight > 0) cls += ' filled';
        return `<div class="${cls}" data-jump="${i}">${i+1}</div>`;
      }).join('')}
    </div>
    <div class="card step-card">
      <div class="step-counter">Paddle ${d.stepIndex + 1} of ${N}</div>
      <div class="field">
        <label>Weight</label>
        <input type="number" inputmode="decimal" step="any" min="0" id="step-weight"
          class="step-weight-input ${disc._invalid ? 'invalid' : ''}"
          value="${disc.weight === null ? '' : disc.weight}" placeholder="0.00" enterkeyhint="next">
      </div>
      <div class="field" style="margin-bottom:4px;">
        <label>ID / label (optional)</label>
        <input type="text" id="step-label" value="${escapeHtml(disc.label)}" placeholder="optional"
          enterkeyhint="${isLast ? 'done' : 'next'}">
      </div>
      <div class="btn-row" style="margin-top:16px;">
        <button class="btn" id="step-back" ${d.stepIndex === 0 ? 'disabled' : ''} style="flex:1;">&#9664; Back</button>
        <button class="btn btn-primary" id="step-next" style="flex:2;">${isLast ? 'Finish' : 'Next &#9654;'}</button>
      </div>
    </div>
  `;
}
function wireStepView(d){
  const weightInput = document.getElementById('step-weight');
  const labelInput = document.getElementById('step-label');
  weightInput.oninput = (e)=>{
    const v = e.target.value;
    d.discs[d.stepIndex].weight = v === '' ? null : Number(v);
    d.discs[d.stepIndex]._invalid = false;
  };
  labelInput.oninput = (e)=>{ d.discs[d.stepIndex].label = e.target.value; };
  weightInput.addEventListener('keydown', (e)=>{
    if(e.key === 'Enter'){ e.preventDefault(); labelInput.focus(); labelInput.select(); }
  });
  labelInput.addEventListener('keydown', (e)=>{
    if(e.key === 'Enter'){ e.preventDefault(); document.getElementById('step-next').click(); }
  });
  document.getElementById('step-back').onclick = ()=>{
    if(d.stepIndex > 0){ d.stepIndex -= 1; render(); }
  };
  document.getElementById('step-next').onclick = ()=> advanceStep(d);
  app.querySelectorAll('[data-jump]').forEach(el=>{
    el.addEventListener('click', ()=>{
      d.stepIndex = Number(el.getAttribute('data-jump'));
      render();
    });
  });
  weightInput.focus();
  weightInput.select();
}
function advanceStep(d){
  const disc = d.discs[d.stepIndex];
  const bad = disc.weight === null || isNaN(disc.weight) || disc.weight <= 0;
  disc._invalid = bad;
  if(bad){ render(); return; }
  if(d.stepIndex === d.discs.length - 1){
    runDraft();
  } else {
    d.stepIndex += 1;
    render();
  }
}

function wireTableView(d){
  app.querySelectorAll('[data-label]').forEach(inp=>{
    inp.oninput = (e)=>{ d.discs[Number(inp.getAttribute('data-label'))].label = e.target.value; };
  });
  app.querySelectorAll('[data-weight]').forEach(inp=>{
    inp.oninput = (e)=>{
      const idx = Number(inp.getAttribute('data-weight'));
      const v = e.target.value;
      d.discs[idx].weight = v === '' ? null : Number(v);
      d.discs[idx]._invalid = false;
    };
  });
  attachEnterNav(document.getElementById('table-card'));
}

// Pressing Enter/Return (or a mobile keypad's "next"/"done" key) moves to the next
// field in the form, in the order the fields appear on screen. From the very last
// field it runs the analysis instead.
function attachEnterNav(container){
  const inputs = Array.from(container.querySelectorAll('input[type=text], input[type=number]'));
  inputs.forEach((inp, i) => {
    inp.addEventListener('keydown', (e) => {
      if(e.key !== 'Enter') return;
      e.preventDefault();
      const next = inputs[i+1];
      if(next){ next.focus(); if(next.select) next.select(); }
      else { inp.blur(); runDraft(); }
    });
  });
}
function runDraft(){
  const d = state.draft;
  d.error = null;
  let firstInvalid = null;
  d.discs.forEach(disc=>{
    const bad = disc.weight === null || isNaN(disc.weight) || disc.weight <= 0;
    disc._invalid = bad;
    if(bad && firstInvalid === null) firstInvalid = true;
  });
  if(firstInvalid){
    d.error = 'Enter a weight greater than 0 for every paddle before running the analysis.';
    d.mode = 'table';
    render();
    return;
  }
  if(!d.name || !d.name.trim()){
    const suggested = `${SIZES[d.size].label} analysis — ${fmtDate(new Date().toISOString())}`;
    const entered = window.prompt('Name this analysis:', suggested);
    d.name = (entered && entered.trim()) ? entered.trim() : suggested;
  }
  const discsClean = d.discs.map(x=>({ id:x.id, label:x.label.trim(), weight:x.weight }));
  const results = runAllHeuristics(discsClean);

  if(d.editingId){
    const existingSaved = state.savedList.find(a => a.id === d.editingId);
    if(existingSaved){
      existingSaved.name = d.name.trim();
      existingSaved.discs = discsClean;
      existingSaved.results = results;
      existingSaved.chosen = null;
      Store.set(existingSaved);
      state.viewingId = existingSaved.id;
      state.currentUnsaved = null;
    } else if(state.currentUnsaved && state.currentUnsaved.id === d.editingId){
      state.currentUnsaved.name = d.name.trim();
      state.currentUnsaved.discs = discsClean;
      state.currentUnsaved.results = results;
      state.currentUnsaved.chosen = null;
      state.viewingId = null;
    }
    state.draft = null;
    state.activeMethod = 'asEntered';
    state.chartSelectedDiscIdx = null;
    state.showShareMenu = false;
    state.view = 'results';
    showToast('Analysis updated');
    render();
    return;
  }

  const analysis = {
    id: uid(),
    name: d.name.trim(),
    size: d.size,
    discCount: discsClean.length,
    createdAt: new Date().toISOString(),
    discs: discsClean,
    results,
    chosen: null,
    _unsaved: true
  };
  state.draft = null;
  state.currentUnsaved = analysis;
  state.viewingId = null;
  state.activeMethod = 'asEntered';
  state.chartSelectedDiscIdx = null;
  state.showShareMenu = false;
  state.view = 'results';
  render();
}

/* ---------- Spider chart ---------- */
// Each spoke points to a ring position; its length is the disc's weight
// (scaled to the heaviest disc). The circle at the end of each spoke is
// labeled with the disc's original data-entry sequence number, not its
// ring position — tapping it reveals the full detail below the chart.
function buildSpiderChartSvg(a, method, selectedIdx){
  const N = a.discCount;
  const res = getMethodResult(a, method);
  const weights = a.discs.map(d=>d.weight);
  const minWeight = Math.min(...weights);
  const maxWeight = Math.max(...weights);
  const range = maxWeight - minWeight;
  const size = 300;
  const center = size/2;
  const maxRadius = size/2 - 30;
  // The innermost ring represents the minimum weight, not zero — otherwise discs
  // with similar weights all cluster near the center and are hard to tell apart.
  const innerRadius = maxRadius * 0.22;

  function radiusForWeight(w){
    if(range <= 0) return innerRadius + (maxRadius - innerRadius) / 2; // all discs equal weight
    return innerRadius + ((w - minWeight) / range) * (maxRadius - innerRadius);
  }

  const points = res.arrangement.map((discIdx, pos)=>{
    const ang = pos * 2*Math.PI/N - Math.PI/2;
    const r = radiusForWeight(weights[discIdx]);
    return { x: center + r*Math.cos(ang), y: center + r*Math.sin(ang), discIdx, pos };
  });

  // Guide rings: innermost = minimum weight, outermost = maximum weight.
  let guides = '';
  [0, 0.5, 1].forEach(f=>{
    const r = innerRadius + f * (maxRadius - innerRadius);
    guides += `<circle cx="${center}" cy="${center}" r="${r.toFixed(2)}" fill="none" stroke="var(--border)" stroke-width="1"/>`;
  });

  let spokes = '';
  for(let pos=0; pos<N; pos++){
    const ang = pos * 2*Math.PI/N - Math.PI/2;
    const x = center + maxRadius*Math.cos(ang);
    const y = center + maxRadius*Math.sin(ang);
    spokes += `<line x1="${center}" y1="${center}" x2="${x.toFixed(2)}" y2="${y.toFixed(2)}" stroke="var(--border)" stroke-width="1"/>`;
  }

  const polyPoints = points.map(p=>`${p.x.toFixed(2)},${p.y.toFixed(2)}`).join(' ');
  const polygon = `<polygon points="${polyPoints}" fill="rgba(111,168,181,0.14)" stroke="var(--data)" stroke-width="1.5"/>`;

  let dots = '';
  points.forEach(p=>{
    const isSel = p.discIdx === selectedIdx;
    dots += `<g class="spider-point" data-disc-idx="${p.discIdx}">
      <circle cx="${p.x.toFixed(2)}" cy="${p.y.toFixed(2)}" r="11"
        fill="${isSel ? 'var(--accent)' : 'var(--panel-2)'}"
        stroke="${isSel ? 'var(--accent)' : 'var(--data)'}" stroke-width="2"/>
      <text x="${p.x.toFixed(2)}" y="${p.y.toFixed(2)}" text-anchor="middle" dominant-baseline="central"
        font-size="9.5" font-family="'IBM Plex Mono',monospace" font-weight="600"
        fill="${isSel ? 'var(--accent-text)' : 'var(--text)'}">${p.discIdx+1}</text>
    </g>`;
  });

  return `<svg viewBox="0 0 ${size} ${size}" style="width:100%; max-width:340px; height:auto; display:block; margin:0 auto;">
    ${guides}${spokes}${polygon}${dots}
  </svg>
  <div style="text-align:center; font-size:10px; color:var(--text-faint); margin-top:2px;">
    Inner ring = lightest paddle (${minWeight}) &middot; Outer ring = heaviest paddle (${maxWeight})
  </div>`;
}
function renderChartDetail(a, selectedIdx){
  if(selectedIdx === null || selectedIdx === undefined){
    return `<div class="chart-detail"><span class="cd-empty">Tap a point on the chart to see its details.</span></div>`;
  }
  const disc = a.discs[selectedIdx];
  return `<div class="chart-detail">
    <div class="cd-row"><span class="k">Entry #</span><span class="v">${selectedIdx+1}</span></div>
    <div class="cd-row"><span class="k">Weight</span><span class="v">${disc.weight}</span></div>
    <div class="cd-row"><span class="k">ID / label</span><span class="v">${escapeHtml(disc.label) || '&mdash;'}</span></div>
  </div>`;
}

// Same geometry as buildSpiderChartSvg, but styled for a light printed page
// (no selection state, no interactivity — points are just static labels).
function buildSpiderChartSvgPrint(a, method){
  const N = a.discCount;
  const res = getMethodResult(a, method);
  const weights = a.discs.map(d=>d.weight);
  const minWeight = Math.min(...weights);
  const maxWeight = Math.max(...weights);
  const range = maxWeight - minWeight;
  const size = 300;
  const center = size/2;
  const maxRadius = size/2 - 30;
  const innerRadius = maxRadius * 0.22;

  function radiusForWeight(w){
    if(range <= 0) return innerRadius + (maxRadius - innerRadius) / 2;
    return innerRadius + ((w - minWeight) / range) * (maxRadius - innerRadius);
  }

  const points = res.arrangement.map((discIdx, pos)=>{
    const ang = pos * 2*Math.PI/N - Math.PI/2;
    const r = radiusForWeight(weights[discIdx]);
    return { x: center + r*Math.cos(ang), y: center + r*Math.sin(ang), discIdx, pos };
  });

  let guides = '';
  [0, 0.5, 1].forEach(f=>{
    const r = innerRadius + f * (maxRadius - innerRadius);
    guides += `<circle cx="${center}" cy="${center}" r="${r.toFixed(2)}" fill="none" stroke="var(--p-border)" stroke-width="1"/>`;
  });

  let spokes = '';
  for(let pos=0; pos<N; pos++){
    const ang = pos * 2*Math.PI/N - Math.PI/2;
    const x = center + maxRadius*Math.cos(ang);
    const y = center + maxRadius*Math.sin(ang);
    spokes += `<line x1="${center}" y1="${center}" x2="${x.toFixed(2)}" y2="${y.toFixed(2)}" stroke="var(--p-border)" stroke-width="1"/>`;
  }

  const polyPoints = points.map(p=>`${p.x.toFixed(2)},${p.y.toFixed(2)}`).join(' ');
  const polygon = `<polygon points="${polyPoints}" fill="rgba(43,103,119,0.10)" stroke="var(--p-data)" stroke-width="1.5"/>`;

  let dots = '';
  points.forEach(p=>{
    dots += `<g>
      <circle cx="${p.x.toFixed(2)}" cy="${p.y.toFixed(2)}" r="11" fill="#ffffff" stroke="var(--p-data)" stroke-width="1.5"/>

    </g>`;
  });

  return `<svg viewBox="0 0 ${size} ${size}" style="width:100%; max-width:320px; height:auto; display:block; margin:0 auto;">
    ${guides}${spokes}${polygon}${dots}
  </svg>
  <div style="text-align:center; font-size:10px; color:var(--p-faint); margin-top:4px;">

  </div>`;

  };
  if(isUnsaved){
    document.getElementById('btn-save').onclick = async ()=>{
      delete a._unsaved;
      await Store.set(a);
      state.savedList = await Store.all();
      state.currentUnsaved = null;
      state.viewingId = a.id;
      showToast('Analysis saved');
      render();
    };
  } else {
    document.getElementById('btn-delete').onclick = async ()=>{
      await Store.delete(a.id);
      state.savedList = state.savedList.filter(x=>x.id!==a.id);
      state.viewingId = null;
      state.view = 'home';
      render();
    };
  }
  document.getElementById('btn-recalculate').onclick = async ()=>{
    const ok = window.confirm('Recalculate all four methods from the current disc weights? The existing Simulated Annealing and Genetic Algorithm results will be replaced and can\'t be recovered.');
    if(!ok) return;
    a.results = runAllHeuristics(a.discs);
    state.chartSelectedDiscIdx = null;
    if(!isUnsaved){
      await Store.set(a);
    }
    showToast('Recalculated all four methods');
    render();
  };
}
function shortLabel(m){
  if(m==='asEntered') return 'Entered';
  if(m==='pairing') return 'AITexcel';
  if(m==='annealing') return 'Annealing';
  if(m==='genetic') return 'Genetic';
  return m;
}

/* ===================== Boot ===================== */
init();
</script>
